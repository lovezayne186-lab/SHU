<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马卡龙像素游戏机</title>
    <style>
        :root {
            --body-color: #FFD1DC;    /* 马卡龙粉 */
            --screen-bg: #F0FFF0;    /* 奶油绿 */
            --btn-mint: #B2F2BB;     /* 薄荷绿 */
            --btn-purple: #E5DBFF;   /* 薰衣草紫 */
            --border-color: #4A4A4A; /* 深灰描边 */
            --text-color: #5D5D5D;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FAF9F6; /* 米白色背景 */
            font-family: 'ZCOOL Kuaile', 'Press Start 2P', cursive;
        }

        /* 游戏机主容器 - 适配手机宽度 */
        .console-wrapper {
            width: 90%;
            max-width: 360px;
            aspect-ratio: 9 / 16;
            background-color: var(--body-color);
            border: 6px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 10px 0 #F4ACB7; /* 扁平化投影 */
            position: relative;
        }

        .game-back-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 5;
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            color: var(--text-color);
            font-size: 24px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0 var(--border-color);
            cursor: pointer;
            font-family: inherit;
        }

        .game-back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--border-color);
        }

        /* 顶部大屏幕区域 */
        .screen-container {
            flex: 1.2; /* 屏幕占据更大比例 */
            background-color: var(--border-color);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .screen-main {
            flex: 1;
            background-color: var(--screen-bg);
            border-radius: 6px;
            border: 4px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 屏幕装饰细节 */
        .screen-main::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .game-title {
            font-size: 24px;
            color: var(--text-color);
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #fff;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 80%;
        }

        .menu-item {
            background: white;
            border: 3px solid var(--border-color);
            margin-bottom: 12px;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-size: 18px;
            color: var(--text-color);
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }

        .menu-item.active {
            background-color: var(--btn-mint);
            transform: scale(1.05);
            box-shadow: 4px 4px 0 var(--border-color);
        }

        .menu-item.active::before {
            content: "★";
            position: absolute;
            left: 10px;
            color: #FFD700;
        }

        .screen-toast {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%) translateY(10px);
            min-width: 150px;
            padding: 9px 12px;
            border: 3px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            color: var(--text-color);
            font-size: 15px;
            text-align: center;
            box-shadow: 4px 4px 0 var(--border-color);
            opacity: 0;
            pointer-events: none;
            transition: opacity .16s ease, transform .16s ease;
            z-index: 2;
        }

        .screen-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 下方按键区 */
        .controls {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding-top: 10px;
        }

        .main-btns {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        /* 扁平化十字键 */
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 30px);
            grid-template-rows: repeat(3, 30px);
        }
        .d-btn {
            background-color: var(--btn-purple);
            border: 3px solid var(--border-color);
            border-radius: 4px;
        }
        .d-up { grid-area: 1 / 2 / 2 / 3; border-bottom: none; border-radius: 4px 4px 0 0; }
        .d-down { grid-area: 3 / 2 / 4 / 3; border-top: none; border-radius: 0 0 4px 4px; }
        .d-left { grid-area: 2 / 1 / 3 / 2; border-right: none; border-radius: 4px 0 0 4px; }
        .d-right { grid-area: 2 / 3 / 3 / 4; border-left: none; border-radius: 0 4px 4px 0; }
        .d-mid { grid-area: 2 / 2 / 3 / 3; background-color: var(--btn-purple); }

        /* 扁平化动作键 */
        .action-btns {
            display: flex;
            gap: 15px;
        }
        .circle-btn {
            width: 50px;
            height: 50px;
            background-color: var(--btn-mint);
            border: 3px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
            box-shadow: 0 4px 0 var(--border-color);
            cursor: pointer;
        }
        .circle-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--border-color);
        }

        /* 底部功能键 */
        .bottom-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .pill-btn {
            width: 40px;
            height: 12px;
            background-color: white;
            border: 3px solid var(--border-color);
            border-radius: 10px;
        }

        /* 装饰用扬声器 */
        .speaker {
            position: absolute;
            bottom: 15px;
            right: 20px;
            display: flex;
            gap: 4px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--border-color);
            border-radius: 50%;
            opacity: 0.3;
        }

    </style>
</head>
<body>

<div class="console-wrapper">
    <button type="button" class="game-back-btn" data-game-back aria-label="返回">‹</button>

    <!-- 屏幕区 -->
    <div class="screen-container">
        <div class="screen-main">
            <div class="game-title">PICK A GAME</div>
            <ul class="menu-list">
                <li class="menu-item active" data-game-choice="jump">跳一跳</li>
                <li class="menu-item" data-game-choice="pindou">拼豆</li>
            </ul>
            <div class="screen-toast" data-game-toast>正在开发中</div>
        </div>
    </div>

    <!-- 按键区 -->
    <div class="controls">
        <div class="main-btns">
            <!-- 十字键 -->
            <div class="d-pad">
                <div class="d-btn d-up"></div>
                <div class="d-btn d-left"></div>
                <div class="d-btn d-mid"></div>
                <div class="d-btn d-right"></div>
                <div class="d-btn d-down"></div>
            </div>

            <!-- AB键 -->
            <div class="action-btns">
                <div class="circle-btn">B</div>
                <div class="circle-btn" style="background-color: var(--btn-purple);">A</div>
            </div>
        </div>

        <!-- 底部小按键 -->
        <div class="bottom-bar">
            <div class="pill-btn"></div>
            <div class="pill-btn"></div>
        </div>
    </div>

    <!-- 扬声器装饰 -->
    <div class="speaker">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</div>

<script>
    const items = document.querySelectorAll('.menu-item');
    const toast = document.querySelector('[data-game-toast]');
    const backBtn = document.querySelector('[data-game-back]');
    let currentIndex = 0;
    let toastTimer = null;

    function setActive(index) {
        items[currentIndex].classList.remove('active');
        currentIndex = (index + items.length) % items.length;
        items[currentIndex].classList.add('active');
    }

    function showDevelopingToast() {
        if (!toast) return;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, 1400);
    }

    function openSelectedGame() {
        const choice = items[currentIndex].getAttribute('data-game-choice');
        if (choice === 'jump') {
            window.location.href = 'wechat-jump/index.html';
            return;
        }
        showDevelopingToast();
    }

    function goBackToDesktop() {
        try {
            if (window.parent && window.parent !== window && typeof window.parent.closeApp === 'function') {
                window.parent.closeApp();
                return;
            }
        } catch (e) { }
        if (window.history.length > 1) {
            window.history.back();
            return;
        }
        window.location.href = '../index.html';
    }

    if (backBtn) {
        backBtn.addEventListener('click', goBackToDesktop);
    }

    items.forEach((item, index) => {
        item.addEventListener('click', () => {
            setActive(index);
            openSelectedGame();
        });
    });

    document.querySelector('.d-up').addEventListener('click', () => setActive(currentIndex - 1));
    document.querySelector('.d-down').addEventListener('click', () => setActive(currentIndex + 1));
    document.querySelector('.circle-btn[style]').addEventListener('click', openSelectedGame);
    document.querySelector('.action-btns .circle-btn:first-child').addEventListener('click', showDevelopingToast);

    window.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowUp') setActive(currentIndex - 1);
        if (event.key === 'ArrowDown') setActive(currentIndex + 1);
        if (event.key === 'Enter') openSelectedGame();
        if (event.key === 'Escape') goBackToDesktop();
    });
</script>

</body>
</html>
